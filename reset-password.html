<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1F0D">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Crect width='44' height='44' rx='9' fill='%230D1F0D'/%3E%3Crect x='18' y='6' width='8' height='32' rx='3' fill='%23B8912A'/%3E%3Crect x='8' y='16' width='28' height='8' rx='3' fill='%23B8912A'/%3E%3C/svg%3E">
<title>Reset Password — GodHealth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0D1F0D;--bg2:#FFFFFF;--border:#E8E0D0;--ink:#1A1410;--gold:#B8912A;--spirit:#6B8F5E;--temple:#C4573A;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:#F2EDD8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.wrap{width:100%;max-width:360px;}
.cross{margin:0 auto 18px;display:block;}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px;}
h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1.15;margin-bottom:6px;color:#F5EDD8;}
h1 em{font-style:italic;color:var(--gold);}
.sub{font-size:13px;color:rgba(245,237,216,.6);line-height:1.6;margin-bottom:26px;}
label{display:block;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,237,216,.6);font-weight:700;margin-bottom:6px;}
input{width:100%;background:var(--bg2);border:1.5px solid var(--border);color:var(--ink);font-family:'Lato',sans-serif;font-size:15px;padding:12px 14px;border-radius:10px;outline:none;transition:border-color .25s;margin-bottom:14px;}
input:focus{border-color:var(--gold);}
.btn{width:100%;background:var(--gold);color:var(--ink);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:14px;border:none;border-radius:10px;cursor:pointer;transition:opacity .25s;}
.btn:active{opacity:.85;}
.msg{display:none;padding:11px 14px;border-radius:10px;margin-bottom:16px;font-size:13px;text-align:left;line-height:1.5;}
.msg.error{display:block;background:rgba(196,87,58,.15);border:1px solid rgba(196,87,58,.35);color:#E8836A;}
.msg.success{display:block;background:rgba(107,143,94,.15);border:1px solid rgba(107,143,94,.4);color:#8FB87A;}
.verse{font-style:italic;font-size:12px;color:rgba(245,237,216,.4);margin-top:26px;line-height:1.6;}
.back{display:inline-block;margin-top:18px;color:var(--gold);font-size:13px;font-weight:700;text-decoration:none;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <svg class="cross" width="44" height="44" viewBox="0 0 44 44" fill="none">
    <rect x="18" y="2" width="8" height="40" rx="3" fill="#D4A83A"/>
    <rect x="4" y="14" width="36" height="8" rx="3" fill="#D4A83A"/>
  </svg>
  <div class="eyebrow">GodHealth</div>
  <h1>Reset<br><em>Password</em></h1>
  <div class="sub" id="sub">Choose a new password for your account.</div>

  <div class="msg" id="msg"></div>

  <div id="form">
    <label>New Password (min 8 characters)</label>
    <input type="password" id="pass1" placeholder="New password" autocomplete="new-password"/>
    <label>Confirm New Password</label>
    <input type="password" id="pass2" placeholder="Confirm password" autocomplete="new-password"/>
    <button class="btn" onclick="doReset()">Update Password</button>
  </div>

  <a class="back" href="index.html" id="backlink" style="display:none;">← Back to Sign In</a>

  <p class="verse">"He restoreth my soul." — Psalm 23:3 (KJV)</p>
</div>

<script>
const SUPABASE_URL='https://attnnjhkjwpunlnokgvx.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_KBSraE-BqUasxBUW5fOxbA_nK6FNITG';
let db=null;
try{if(typeof supabase!=='undefined'&&supabase.createClient){db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}}catch(e){}

function showMsg(text,type){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+type;}

// When the user arrives via the email link, Supabase puts a recovery token in the URL.
// The SDK automatically reads it and creates a temporary recovery session.
(async function init(){
  if(!db){showMsg('Connection unavailable. Please open this link again or check your internet.','error');return;}
  try{
    // Supabase detects the recovery token from the URL hash automatically
    const {data}=await db.auth.getSession();
    if(!data||!data.session){
      // Listen for the PASSWORD_RECOVERY event which fires after the SDK parses the URL
      db.auth.onAuthStateChange(function(event,session){
        if(event==='PASSWORD_RECOVERY'||session){
          document.getElementById('form').style.display='block';
        }
      });
    }
  }catch(e){}
})();

async function doReset(){
  const p1=document.getElementById('pass1').value||'';
  const p2=document.getElementById('pass2').value||'';
  if(!p1||!p2){showMsg('Please fill in both password fields.','error');return;}
  if(p1.length<8){showMsg('Password must be at least 8 characters.','error');return;}
  if(p1!==p2){showMsg('The two passwords do not match.','error');return;}
  if(!db){showMsg('Connection unavailable. Please try again.','error');return;}
  try{
    const {error}=await db.auth.updateUser({password:p1});
    if(error)throw error;
    showMsg('Your password has been updated! You can now sign in with your new password.','success');
    document.getElementById('form').style.display='none';
    document.getElementById('sub').style.display='none';
    document.getElementById('backlink').style.display='inline-block';
    // Sign out the temporary recovery session so the user logs in fresh
    try{await db.auth.signOut();}catch(e){}
  }catch(e){
    showMsg('Could not update password: '+(e.message||e)+'. The reset link may have expired — please request a new one.','error');
  }
}
</script>
</body>
</html>
